name: Scheduled Integration

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  canonical-cli-integration:
    name: canonical-cli-integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release CLI
        run: cargo build --release -p deslop-cli
      - name: Run workspace integration tests
        run: cargo test --workspace
      - name: Verify repo-local launcher
        run: ./scripts/desloppify-local --help
